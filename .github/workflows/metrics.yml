name: Generate Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # ── CHECKOUT FIRST ────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 1. ACHIEVEMENTS ──────────────────────────────────────────
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0
          config_timezone: Asia/Colombo
          config_padding: 10

      # ── 2. OVERVIEW (stats + habits + calendar) ──────────────────
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.overview.svg
          base: header, activity, repositories
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_calendar: yes
          plugin_calendar_limit: 1
          config_timezone: Asia/Colombo
          config_padding: 10

      # ── 3. LANGUAGES (detailed breakdown) ────────────────────────
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          config_timezone: Asia/Colombo
          config_padding: 10

      # ── COMMIT ALL GENERATED SVGs ─────────────────────────────────
      - name: Commit & Push metrics
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add metrics.achievements.svg metrics.overview.svg metrics.languages.svg
          git diff --staged --quiet || git commit -m "chore: update metrics SVGs"
          git push
